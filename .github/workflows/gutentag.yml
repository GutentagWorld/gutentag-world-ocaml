name: Gutentag, World!

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.1"

      - name: Run
        run: ocaml main.ml

      - name: Verify output
        run: bash test.sh
